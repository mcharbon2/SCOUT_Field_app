<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1a">
<title>SCOUT Field Tech v1.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');
:root {
  --bg-deep: #0a0f1a; --bg-surface: #111827; --bg-card: #1a2234;
  --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --text: #f3f4f6;
  --mono: 'JetBrains Mono', monospace;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg-deep); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
.card { background: var(--bg-card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #2d3748; }
.form-group { margin-bottom: 15px; }
label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #9ca3af; font-weight: 600; }
input { width: 100%; padding: 10px; background: var(--bg-surface); border: 1px solid #374151; border-radius: 6px; color: white; box-sizing: border-box; font-family: var(--mono); }
.btn { border: none; border-radius: 6px; padding: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; color: white; width: 100%; margin-bottom: 10px; }
.btn-primary { background: var(--primary); }
.btn-success { background: var(--success); }
.btn-danger { background: var(--danger); }
.log { background: #000; border-radius: 6px; padding: 10px; font-family: var(--mono); font-size: 0.75rem; height: 180px; overflow-y: auto; color: #10b981; border: 1px solid #1a2234; }
.log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; }
.gps-box { display: flex; gap: 10px; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="card">
    <h2 style="margin:0 0 15px 0; color:var(--primary)">SCOUT Config</h2>
    <div class="form-group">
        <label>Station Name (max 16 chars)</label>
        <input type="text" id="cfgName" placeholder="Bait1" maxlength="16">
    </div>
    <div class="form-group">
        <label>Zone (max 16 chars)</label>
        <input type="text" id="cfgZone" placeholder="Alpha" maxlength="16">
    </div>
    <div class="gps-box">
        <div style="flex:1"><label>Lat</label><input type="number" id="gpsLat" step="any" readonly></div>
        <div style="flex:1"><label>Lon</label><input type="number" id="gpsLon" step="any" readonly></div>
    </div>
    <button id="btnGPS" class="btn btn-primary" onclick="captureGPS()">📍 Get Phone GPS</button>
</div>

<div class="card">
    <button id="btnScan" class="btn btn-primary" onclick="startScan()">1. Scan for ROVER</button>
    <button id="btnSave" class="btn btn-success" onclick="sendConfig()">2. Save Configuration</button>
    <button id="btnFinalize" class="btn btn-danger" onclick="finalizeAndSleep()">3. Finalize & Deploy</button>
</div>

<div class="card">
    <label>Hardware Telemetry</label>
    <div id="logComm" class="log"></div>
</div>

<script>
let device, gattServer, txChar;
let seq = 0;
const SERVICE_UUID = "53434f55-5400-0001-4e45-54574f524b53";
const TX_UUID      = "53434f55-5400-0002-4e45-54574f524b53";

function log(msg, err=false) {
    const el = document.getElementById('logComm');
    const color = err ? "#ef4444" : "#10b981";
    el.innerHTML += `<div class="log-entry" style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    el.scrollTop = el.scrollHeight;
}

function captureGPS() {
    navigator.geolocation.getCurrentPosition(pos => {
        document.getElementById('gpsLat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('gpsLon').value = pos.coords.longitude.toFixed(6);
        log("GPS Captured: " + pos.coords.latitude.toFixed(4) + ", " + pos.coords.longitude.toFixed(4));
    }, e => log("GPS Error: " + e.message, true), {enableHighAccuracy: true});
}

async function startScan() {
    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: 'ROVER-' }],
            optionalServices: [SERVICE_UUID]
        });
        log("Connecting to " + device.name + "...");
        gattServer = await device.gatt.connect();
        const service = await gattServer.getPrimaryService(SERVICE_UUID);
        txChar = await service.getCharacteristic(TX_UUID);
        log("✅ BLE Link Established.");
    } catch (e) { log("Connection Error: " + e, true); }
}

async function sendConfig() {
    if (!txChar) return log("Error: Not connected!", true);
    
    const name = document.getElementById('cfgName').value.trim() || "ROVER";
    const zone = document.getElementById('cfgZone').value.trim() || "ZONE";
    const lat = parseFloat(document.getElementById('gpsLat').value) || 0.0;
    const lon = parseFloat(document.getElementById('gpsLon').value) || 0.0;

    try {
        // FIXED 42-BYTE PACKET MAP:
        // [0..1] Header (CMD, SEQ)
        // [2..17] Station Name (16 bytes)
        // [18..33] Zone Name (16 bytes)
        // [34..37] Lat (Float32)
        // [38..41] Lon (Float32)
        const buffer = new ArrayBuffer(42);
        const payload = new Uint8Array(buffer);
        const view = new DataView(buffer);
        const encoder = new TextEncoder();

        payload[0] = 0x01; // CMD_CONFIGURE
        payload[1] = ++seq;

        // Encode strings with explicit 16-byte null-padding
        const nameBytes = encoder.encode(name);
        for(let i=0; i<16; i++) payload[2+i] = (i < nameBytes.length) ? nameBytes[i] : 0x00;

        const zoneBytes = encoder.encode(zone);
        for(let i=0; i<16; i++) payload[18+i] = (i < zoneBytes.length) ? zoneBytes[i] : 0x00;

        // Encode Floats (Little Endian for ESP32)
        view.setFloat32(34, lat, true);
        view.setFloat32(38, lon, true);

        log(`Sending 42-byte config (Seq ${seq})...`);
        await txChar.writeValue(payload);
        log("✅ ACK: Config accepted by ROVER.");
    } catch (e) { log("Transmission Failed: " + e, true); }
}

async function finalizeAndSleep() {
    if (!txChar) return;
    try {
        log("Sending FINALIZE (0x09)...");
        await txChar.writeValue(new Uint8Array([0x09, ++seq]));
        log("✅ ROVER entering Deep Sleep. Closing Link.");
        await device.gatt.disconnect();
    } catch (e) { log("Finalize Error: " + e, true); }
}
</script>
</body>
</html>
