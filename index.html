<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1a">
<title>SCOUT Field Tech</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap');
:root {
  --bg-deep: #0a0f1a; --bg-surface: #111827; --bg-card: #1a2234;
  --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --text: #f3f4f6;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg-deep); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
.card { background: var(--bg-card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #2d3748; }
.form-group { margin-bottom: 15px; }
label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #9ca3af; font-weight: 600; }
input { width: 100%; padding: 10px; background: var(--bg-surface); border: 1px solid #374151; border-radius: 6px; color: white; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
.btn { border: none; border-radius: 6px; padding: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; color: white; width: 100%; margin-bottom: 10px; }
.btn-primary { background: var(--primary); }
.btn-success { background: var(--success); }
.btn-danger { background: var(--danger); }
.log { background: #000; border-radius: 6px; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; height: 150px; overflow-y: auto; color: #10b981; border: 1px solid #1a2234; }
.log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }
</style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">Device Setup</h2>
    <div class="form-group">
        <label>Station Name</label>
        <input type="text" id="stationName" placeholder="e.g. Bait-01" maxlength="16">
    </div>
    <div class="form-group">
        <label>Zone</label>
        <input type="text" id="zoneName" placeholder="e.g. North Ridge" maxlength="16">
    </div>
    <div class="form-group" style="display:flex; gap:10px;">
        <div style="flex:1">
            <label>Lat</label>
            <input type="number" id="gpsLat" step="any">
        </div>
        <div style="flex:1">
            <label>Lon</label>
            <input type="number" id="gpsLon" step="any">
        </div>
    </div>
    <button id="btnGetGPS" class="btn btn-primary">Get Phone GPS</button>
</div>

<div class="card">
    <button id="btnScan" class="btn btn-primary">Scan for ROVER</button>
    <button id="btnSave" class="btn btn-success">Save Configuration</button>
    <button id="btnFinalize" class="btn btn-danger">Finalize & Deploy</button>
</div>

<div class="card">
    <label>System Log</label>
    <div id="logComm" class="log"></div>
</div>

<script>
let device, gattServer, txCharacteristic;
const SERVICE_UUID = "53434f55-5400-0001-4e45-54574f524b53";
const TX_UUID      = "53434f55-5400-0002-4e45-54574f524b53";

function log(msg) {
    const el = document.getElementById('logComm');
    el.innerHTML += `<div class="log-entry">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    el.scrollTop = el.scrollHeight;
}

document.getElementById('btnGetGPS').onclick = () => {
    navigator.geolocation.getCurrentPosition(pos => {
        document.getElementById('gpsLat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('gpsLon').value = pos.coords.longitude.toFixed(6);
        log("GPS Updated from phone sensor.");
    });
};

document.getElementById('btnScan').onclick = async () => {
    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: 'ROVER-BAIT' }],
            optionalServices: [SERVICE_UUID]
        });
        log(`Connecting to ${device.name}...`);
        gattServer = await device.gatt.connect();
        const service = await gattServer.getPrimaryService(SERVICE_UUID);
        txCharacteristic = await service.getCharacteristic(TX_UUID);
        log("Connected & Ready.");
    } catch (e) { log("Error: " + e); }
};

document.getElementById('btnSave').onclick = async () => {
    if (!txCharacteristic) return log("Not connected!");
    
    const name = document.getElementById('stationName').value.padEnd(16, '\0');
    const zone = document.getElementById('zoneName').value.padEnd(16, '\0');
    const lat = parseFloat(document.getElementById('gpsLat').value);
    const lon = parseFloat(document.getElementById('gpsLon').value);

    try {
        log("Sending configuration...");
        // CMD 0x01, SEQ 0x01, 16b Name, 16b Zone, 4b Lat, 4b Lon
        let payload = new Uint8Array(2 + 16 + 16 + 8);
        payload[0] = 0x01; payload[1] = 0x01;
        const encoder = new TextEncoder();
        payload.set(encoder.encode(name).slice(0,16), 2);
        payload.set(encoder.encode(zone).slice(0,16), 18);
        
        let view = new DataView(payload.buffer);
        view.setFloat32(34, lat, true);
        view.setFloat32(38, lon, true);
        
        await txCharacteristic.writeValue(payload);
        log("✅ Configuration Saved.");
    } catch (e) { log("Save failed: " + e); }
};

document.getElementById('btnFinalize').onclick = async () => {
    if (!txCharacteristic) return log("Not connected!");
    try {
        log("Sending Finalize command (0x09)...");
        const cmd = new Uint8Array([0x09, 0x00]); // CMD_FINALIZE
        await txCharacteristic.writeValue(cmd);
        log("✅ ROVER commanded to sleep. Disconnecting...");
        await device.gatt.disconnect();
    } catch (e) { log("Finalize failed: " + e); }
};
</script>
</body>
</html>
